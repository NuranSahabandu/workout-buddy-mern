version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend_c
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: frontend_c
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # this volume part have issues on windows; so if using windows this needs to be changed.
    
